<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录界面演示 - OpenClaw</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 1rem;
    }

    .login-container {
      max-width: 420px;
      width: 100%;
    }

    .login-form {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 0 0 0.5rem 0;
    }

    .login-header p {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-group input[type="email"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    .password-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .password-input-wrapper input {
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      padding: 0.25rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .toggle-password:hover {
      opacity: 1;
    }

    .error-message {
      display: block;
      color: #ef4444;
      font-size: 0.8rem;
      margin-top: 0.375rem;
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #4b5563;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      cursor: pointer;
    }

    .forgot-password-link {
      background: none;
      border: none;
      color: #4f46e5;
      font-size: 0.875rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
    }

    .forgot-password-link:hover {
      color: #4338ca;
    }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 0.875rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      display: none;
    }

    .error-banner.visible {
      display: flex;
    }

    .submit-button {
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .submit-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .submit-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .spinner {
      width: 1rem;
      height: 1rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .register-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #6b7280;
      font-size: 0.95rem;
    }

    .register-link button {
      background: none;
      border: none;
      color: #4f46e5;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      font-size: inherit;
    }

    .register-link button:hover {
      color: #4338ca;
      text-decoration: underline;
    }

    .login-footer {
      text-align: center;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.3);
    }

    .login-footer p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.8rem;
    }

    /* 成功状态 */
    .success-container {
      text-align: center;
      padding: 2rem;
    }

    .success-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .success-container h2 {
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }

    .success-container p {
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    .user-info {
      background: #f3f4f6;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .user-info pre {
      font-size: 0.8rem;
      overflow-x: auto;
    }

    .logout-button {
      background: #6b7280;
      color: white;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .logout-button:hover {
      background: #4b5563;
    }

    /* Mobile responsive */
    @media (max-width: 480px) {
      .login-container {
        padding: 0;
      }

      .login-form {
        padding: 1.5rem;
      }

      .form-options {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <!-- 登录表单 -->
    <form class="login-form" id="loginForm">
      <div class="login-header">
        <h1>Welcome Back</h1>
        <p>Sign in to continue to your account</p>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          placeholder="you@example.com"
          autocomplete="email"
        />
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-input-wrapper">
          <input
            id="password"
            type="password"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            id="togglePassword"
            tabindex="-1"
          >
            👁️
          </button>
        </div>
        <span class="error-message" id="passwordError"></span>
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          <span>Remember me for 30 days</span>
        </label>
        <button type="button" class="forgot-password-link" id="forgotPassword">
          Forgot password?
        </button>
      </div>

      <div class="error-banner" id="errorBanner">
        <span>⚠️</span>
        <span id="errorText">Invalid email or password</span>
      </div>

      <button type="submit" class="submit-button" id="submitBtn">
        Sign In
      </button>

      <p class="register-link">
        Don't have an account? 
        <button type="button" id="registerBtn">Sign up</button>
      </p>
    </form>

    <!-- 成功状态（隐藏） -->
    <div class="login-form success-container" id="successContainer" style="display: none;">
      <div class="success-icon">🎉</div>
      <h2>Login Successful!</h2>
      <p>Welcome back, <span id="usernameDisplay"></span></p>
      
      <div class="user-info">
        <strong>User Data:</strong>
        <pre id="userData"></pre>
      </div>
      
      <button class="logout-button" id="logoutBtn">Logout</button>
    </div>

    <div class="login-footer">
      <p>🔒 Secure login with 256-bit encryption</p>
    </div>
  </div>

  <script>
    // DOM 元素
    const loginForm = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    const errorBanner = document.getElementById('errorBanner');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const successContainer = document.getElementById('successContainer');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const userData = document.getElementById('userData');
    const logoutBtn = document.getElementById('logoutBtn');
    const forgotPassword = document.getElementById('forgotPassword');
    const registerBtn = document.getElementById('registerBtn');

    // 切换密码显示
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      togglePassword.textContent = isPassword ? '🙈' : '👁️';
    });

    // 验证邮箱
    function validateEmail(email) {
      if (!email || email.trim().length === 0) {
        return 'Email is required';
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email.trim())) {
        return 'Please enter a valid email address';
      }
      return null;
    }

    // 显示错误
    function showError(field, message) {
      if (field === 'email') {
        emailError.textContent = message;
      } else if (field === 'password') {
        passwordError.textContent = message;
      } else if (field === 'submit') {
        errorText.textContent = message;
        errorBanner.classList.add('visible');
      }
    }

    // 清除错误
    function clearErrors() {
      emailError.textContent = '';
      passwordError.textContent = '';
      errorBanner.classList.remove('visible');
    }

    // 设置加载状态
    function setLoading(loading) {
      submitBtn.disabled = loading;
      if (loading) {
        submitBtn.innerHTML = '<span class="spinner"></span> Signing in...';
      } else {
        submitBtn.innerHTML = 'Sign In';
      }
    }

    // 模拟登录 API
    function mockLogin(email, password) {
      return new Promise((resolve, reject) => {
        setTimeout(() => {
          // 模拟验证
          if (email === 'test@example.com' && password === 'Password123') {
            resolve({
              user: {
                id: 'usr_' + Math.random().toString(36).substr(2, 9),
                email: email,
                username: email.split('@')[0]
              },
              token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            });
          } else {
            reject(new Error('Invalid email or password'));
          }
        }, 1500);
      });
    }

    // 登录成功
    function handleLoginSuccess(data) {
      loginForm.style.display = 'none';
      successContainer.style.display = 'block';
      usernameDisplay.textContent = data.user.username;
      userData.textContent = JSON.stringify(data, null, 2);
    }

    // 登出
    function handleLogout() {
      loginForm.style.display = 'block';
      successContainer.style.display = 'none';
      emailInput.value = '';
      passwordInput.value = '';
      clearErrors();
    }

    // 表单提交
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      // 验证
      const emailError = validateEmail(email);
      if (emailError) {
        showError('email', emailError);
        return;
      }

      if (!password) {
        showError('password', 'Password is required');
        return;
      }

      // 登录
      setLoading(true);
      try {
        const data = await mockLogin(email, password);
        handleLoginSuccess(data);
      } catch (error) {
        showError('submit', error.message);
      } finally {
        setLoading(false);
      }
    });

    // 登出按钮
    logoutBtn.addEventListener('click', handleLogout);

    // 忘记密码
    forgotPassword.addEventListener('click', () => {
      alert('忘记密码功能演示：\n\n这里会跳转到密码重置页面，\n用户输入邮箱后接收重置链接。');
    });

    // 注册按钮
    registerBtn.addEventListener('click', () => {
      alert('注册功能演示：\n\n这里会跳转到注册页面，\n用户可以创建新账户。');
    });

    // 输入时清除错误
    emailInput.addEventListener('input', () => {
      emailError.textContent = '';
      errorBanner.classList.remove('visible');
    });

    passwordInput.addEventListener('input', () => {
      passwordError.textContent = '';
      errorBanner.classList.remove('visible');
    });

    // 提示信息
    console.log('%c🔐 登录演示', 'font-size: 16px; font-weight: bold; color: #4f46e5;');
    console.log('\n测试账号:');
    console.log('  Email: test@example.com');
    console.log('  Password: Password123');
    console.log('\n提示: 试试输入错误的密码看看错误提示！');
  </script>
</body>
</html>
